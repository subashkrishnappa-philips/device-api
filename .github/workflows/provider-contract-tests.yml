# ──────────────────────────────────────────────────────────────────────────────
# Provider Contract & Swagger Tests — device-api
#
# Triggers:
#   • push / pull_request on main or develop  (everyday dev workflow)
#   • repository_dispatch: pact-contracts-updated  (consumer CI finished)
#
# What runs:
#   1. Build DeviceApi.sln (API + provider tests + tool)
#   2. Download the latest pact file published by device-api-consumer CI
#   3. Run provider tests — DeviceApi boots in-process via ApiBootstrap,
#      no external server needed
#        - DeviceApiProviderTests              (pact replay)
#        - SwaggerContractValidatorTests        (swagger drift + consumer notification)
#        - SwaggerCoverageTests                 (endpoint coverage gate)
#        - SwaggerResponseFieldCoverageTests    (response field coverage gate — catches new fields not in pact)
# ──────────────────────────────────────────────────────────────────────────────

name: Provider Contract Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  repository_dispatch:
    types: [pact-contracts-updated]    # fired by device-api-consumer CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# dorny/test-reporter requires checks:write to create GitHub Check runs
# actions:write is required for GITHUB_TOKEN to trigger workflow_dispatch on swagger-sync
permissions:
  contents: read
  checks: write
  actions: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  CONFIGURATION: Release

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    name: Restore & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-provider-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-provider-${{ runner.os }}-

      - name: Restore
        run: dotnet restore DeviceApi.sln

      - name: Build
        run: dotnet build DeviceApi.sln --no-restore --configuration ${{ env.CONFIGURATION }}

      # Cache build output so the test job can skip rebuild
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            src/**/bin
            src/**/obj
            tests/**/bin
            tests/**/obj
            tools/**/bin
            tools/**/obj
          key: build-provider-${{ runner.os }}-${{ github.sha }}

  # ── Job 2: Provider Tests ─────────────────────────────────────────────────────
  provider-tests:
    name: Run Provider Contract Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-provider-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-provider-${{ runner.os }}-

      - name: Restore build output cache
        uses: actions/cache@v4
        with:
          path: |
            src/**/bin
            src/**/obj
            tests/**/bin
            tests/**/obj
            tools/**/bin
            tools/**/obj
          key: build-provider-${{ runner.os }}-${{ github.sha }}

      - name: Get Latest Run ID from Consumer CI
        id: get-run-id
        run: |
            # Use GitHub CLI to find the latest successful run ID for the specific workflow
            RUN_ID=$(gh run list \
            --repo "${{ github.repository_owner }}/device-api-consumer" \
            --workflow "consumer-contract-tests.yml" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
            
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
            # Use your existing token logic to authorize the CLI
            GH_TOKEN: ${{ secrets.CONSUMER_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Download pact contracts from consumer CI
        if: steps.get-run-id.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
            name: pact-contracts
            path: contracts/
            repository: ${{ github.repository_owner }}/device-api-consumer
            run-id: ${{ steps.get-run-id.outputs.run_id }}
            github-token: ${{ secrets.CONSUMER_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: List contract files available
        run: |
          echo "── contracts/ ──────────────────────────────"
          ls -la contracts/ || echo "(empty — first run or download skipped)"

      # ── Run all three provider test classes ───────────────────────────────────
      # The DeviceApi is NOT started externally here.
      # DeviceApiProviderFixture boots it in-process via ApiBootstrap.CreateWebApplication().
      - name: Run provider tests
        run: |
          dotnet test tests/DeviceApi.Provider.Tests \
            --configuration ${{ env.CONFIGURATION }} \
            --logger "trx;LogFileName=provider-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-test-results-${{ github.sha }}
          path: TestResults/

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
            files: "TestResults/*.trx"
            check_name: "Provider Contract Test Results"

  # ── Job 3: Auto-trigger Swagger Sync on test failure ─────────────────────────
  # When provider tests fail it means the API has drifted from the pact
  # (e.g. a new field like newPartNumber is present in the API but not yet
  # covered by a consumer interaction).  Automatically kick off swagger-sync
  # so stubs are generated and a PR is opened in device-api-consumer.
  trigger-swagger-sync:
    name: Trigger Swagger Sync (on failure)
    runs-on: ubuntu-latest
    needs: provider-tests
    # Only run when provider-tests failed; skip on PRs to avoid noise
    if: failure() && github.event_name != 'pull_request'

    steps:
      - name: Dispatch swagger-sync workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'swagger-sync.yml',
              ref: context.ref
            });

            console.log('swagger-sync.yml dispatched due to provider test failure');

            await core.summary
              .addHeading('Swagger Sync Triggered', 3)
              .addRaw(
                '⚠️ Provider contract tests **failed** — ' +
                '`swagger-sync.yml` has been dispatched to regenerate consumer stubs.\n\n' +
                'A pull request will be opened in `device-api-consumer` with updated stubs.'
              )
              .write();
